<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Handingtime 操作台</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d8dde6;
      --text: #202733;
      --muted: #687385;
      --primary: #176b87;
      --primary-strong: #0f536b;
      --danger: #b3261e;
      --ok: #176f3d;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 28px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }

    main {
      padding: 24px 28px 36px;
      display: grid;
      grid-template-columns: minmax(360px, 520px) minmax(420px, 1fr);
      gap: 22px;
      align-items: start;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 16px;
      font-weight: 650;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 14px 0 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    input[type="file"].hidden-file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      line-height: 1.45;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .file-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .upload-choice {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      margin: 0;
      border: 1px solid var(--primary);
      border-radius: 6px;
      padding: 10px 14px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    .upload-choice.secondary {
      background: #fff;
      color: var(--primary);
    }

    .drop-zone {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfd;
    }

    .drop-zone.dragging {
      border-color: var(--primary);
      background: #edf3f5;
    }

    button {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      min-height: 40px;
    }

    button.secondary {
      background: #fff;
      color: var(--primary);
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .inline input {
      width: auto;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(100px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfd;
    }

    .metric strong {
      display: block;
      font-size: 22px;
      margin-top: 4px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #edf3f5;
      color: var(--primary-strong);
      font-size: 13px;
      font-weight: 600;
    }

    .badge.failed { background: #fdecec; color: var(--danger); }
    .badge.completed { background: #eaf6ef; color: var(--ok); }

    pre {
      height: 390px;
      overflow: auto;
      margin: 12px 0 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111820;
      color: #d7e2ee;
      padding: 14px;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .downloads {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .downloads a {
      color: var(--primary);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      text-decoration: none;
      background: #fff;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      background: #fbfcfd;
    }

    .file-name {
      word-break: break-all;
    }

    .error-text {
      color: var(--danger);
    }

    .ok-text {
      color: var(--ok);
    }

    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; padding: 18px; }
      header { padding: 16px 18px; align-items: flex-start; flex-direction: column; }
      .status-grid { grid-template-columns: repeat(2, 1fr); }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Handingtime 操作台</h1>
      <div class="hint">上传文件后按文件名自动识别店铺账号和 handingtime 天数，后台批量执行并生成结果文件。</div>
    </div>
    <span id="serverState" class="badge">未连接</span>
  </header>

  <main>
    <section>
      <h2>新建任务</h2>
      <label>SKU 文件</label>
      <div id="dropZone" class="drop-zone">
        <div class="file-actions">
          <label class="upload-choice" for="file">选择多个文件</label>
          <label class="upload-choice secondary" for="folder">选择文件夹</label>
        </div>
        <input id="file" class="hidden-file-input" type="file" accept=".csv,.txt,text/csv,text/plain" multiple />
        <input id="folder" class="hidden-file-input" type="file" webkitdirectory directory multiple />
        <div class="hint">文件名示例：epus_instock_ht2.csv、damaus_outofstock_ht6.csv。前缀识别店铺账号，ht 后面的数字识别修改天数。</div>
      </div>
      <div id="fileQueue" class="hint">尚未选择文件。</div>

      <div class="row">
        <div>
          <label for="accessToken">访问令牌</label>
          <input id="accessToken" type="password" placeholder="服务器设置 HT_WEB_TOKEN 时必填" />
        </div>
        <div>
          <label for="loginUser">易仓登录账号</label>
          <input id="loginUser" value="CNSZ401" />
        </div>
      </div>

      <div class="row">
        <div>
          <label for="loginPass">易仓登录密码</label>
          <input id="loginPass" type="password" placeholder="默认使用环境变量或本机输入" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="saveTokenBtn" class="secondary" type="button">保存令牌</button>
        </div>
      </div>

      <label for="batchSize">后台批大小</label>
      <input id="batchSize" type="number" min="1" max="1000" value="500" />

      <label class="inline">
        <input id="dryRun" type="checkbox" />
        只查询不保存
      </label>

      <div class="actions">
        <button id="startBtn">开始执行</button>
        <button id="clearBtn" class="secondary">清空文件</button>
      </div>
    </section>

    <section>
      <h2>任务状态</h2>
      <div id="jobBadge" class="badge">无任务</div>
      <div class="status-grid">
        <div class="metric"><span>SKU 总数</span><strong id="mTotal">0</strong></div>
        <div class="metric"><span>已处理</span><strong id="mProcessed">0</strong></div>
        <div class="metric"><span>成功保存</span><strong id="mOk">0</strong></div>
        <div class="metric"><span>未查到/失败</span><strong id="mIssue">0</strong></div>
      </div>
      <div class="hint" id="jobMeta">任务启动后这里会显示进度。</div>
      <div class="downloads" id="downloads"></div>
      <pre id="logs"></pre>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let currentJobIds = [];
    let pollTimer = null;
    let basePath = window.location.pathname.startsWith("/handingtime") ? "/handingtime" : "";
    let accountMap = {
      EPUS: "AmazonEPUS",
      DAMAUS: "Amazon_PZnew_US_US"
    };
    let queuedFiles = [];

    function api(path) {
      return `${basePath}${path}`;
    }

    function splitSkus(text) {
      const seen = new Set();
      const out = [];
      text.split(/[\s,，;；]+/).map(s => s.trim()).filter(Boolean).forEach((sku) => {
        if (/^seller_sku$/i.test(sku)) return;
        if (!seen.has(sku)) {
          seen.add(sku);
          out.push(sku);
        }
      });
      return out;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function inferFromFileName(fileName) {
      const baseName = fileName.split(/[\\/]/).pop() || fileName;
      const stem = baseName.replace(/\.[^.]+$/, "");
      const accountKey = (stem.split(/[_\-\s]+/)[0] || "").toUpperCase();
      const htMatch = stem.match(/(?:^|[_\-\s])ht(\d+)(?=$|[_\-\s])/i);
      return {
        accountKey,
        account: accountMap[accountKey] || "",
        handingTime: htMatch ? htMatch[1] : ""
      };
    }

    function fileProblem(item) {
      if (!item.account) return `无法识别店铺前缀：${item.accountKey || "-"}`;
      if (!item.handingTime) return "无法识别 ht 天数";
      if (!item.skus.length) return "文件内没有可处理 SKU";
      return "";
    }

    function isSkuFile(file) {
      return /\.(csv|txt)$/i.test(file.name || "");
    }

    function fileKey(file) {
      return [
        file.webkitRelativePath || file.name,
        file.size,
        file.lastModified
      ].join("|");
    }

    function displayName(file) {
      return file.webkitRelativePath || file.name;
    }

    async function addFiles(fileList) {
      const existing = new Set(queuedFiles.map(item => item.key));
      const files = Array.from(fileList || []).filter(isSkuFile);
      const additions = [];
      for (const file of files) {
        const key = fileKey(file);
        if (existing.has(key)) continue;
        existing.add(key);
        const text = await file.text();
        const name = displayName(file);
        const inferred = inferFromFileName(name);
        additions.push({
          key,
          name,
          skus: splitSkus(text),
          ...inferred
        });
      }
      queuedFiles = [...queuedFiles, ...additions];
      renderFileQueue();
    }

    function renderFileQueue() {
      if (!queuedFiles.length) {
        $("fileQueue").textContent = "尚未选择文件。";
        return;
      }
      const rows = queuedFiles.map((item) => {
        const problem = fileProblem(item);
        const state = problem ? `<span class="error-text">${escapeHtml(problem)}</span>` : `<span class="ok-text">可执行</span>`;
        return `
          <tr>
            <td class="file-name">${escapeHtml(item.name)}</td>
            <td>${escapeHtml(item.accountKey)}<br>${escapeHtml(item.account || "-")}</td>
            <td>${escapeHtml(item.handingTime || "-")}</td>
            <td>${item.skus.length}</td>
            <td>${state}</td>
          </tr>
        `;
      }).join("");
      $("fileQueue").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>文件</th>
              <th>店铺</th>
              <th>天数</th>
              <th>SKU</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function setBadge(el, status) {
      el.className = "badge";
      if (status === "completed" || status === "completed_with_failures") el.classList.add("completed");
      if (status === "failed") el.classList.add("failed");
      el.textContent = status || "无任务";
    }

    function authHeaders() {
      const token = $("accessToken").value || localStorage.getItem("htAccessToken") || "";
      return token ? { "X-HT-Token": token } : {};
    }

    async function loadConfig() {
      const res = await fetch(api("/api/config"));
      const data = await res.json();
      basePath = data.basePath || basePath;
      accountMap = data.accounts || accountMap;
      queuedFiles = queuedFiles.map(item => ({ ...item, ...inferFromFileName(item.name) }));
      $("loginUser").value = data.defaultLoginUser || "CNSZ401";
      $("serverState").textContent = "已连接";
      $("serverState").className = "badge completed";
      renderFileQueue();
    }

    async function startJob() {
      if (!queuedFiles.length) {
        alert("请先选择 SKU 文件。");
        return;
      }
      const invalid = queuedFiles.filter(fileProblem);
      if (invalid.length) {
        alert(`有 ${invalid.length} 个文件无法执行，请先检查文件名或 SKU 内容。`);
        return;
      }
      $("startBtn").disabled = true;
      try {
        const created = [];
        for (const item of queuedFiles) {
          const payload = {
            sourceFile: item.name,
            account: item.account,
            handingTime: item.handingTime,
            batchSize: Number($("batchSize").value || 500),
            loginUser: $("loginUser").value.trim(),
            loginPass: $("loginPass").value,
            dryRun: $("dryRun").checked,
            skuText: item.skus.join("\n")
          };
          const res = await fetch(api("/api/jobs"), {
            method: "POST",
            headers: { "Content-Type": "application/json", ...authHeaders() },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(`${item.name}: ${data.error || "创建任务失败"}`);
          created.push(data.job.id);
        }
        currentJobIds = created;
        $("logs").textContent = "";
        $("downloads").innerHTML = "";
        if (pollTimer) clearInterval(pollTimer);
        poll();
        pollTimer = setInterval(poll, 2500);
      } catch (err) {
        alert(err.message);
        $("startBtn").disabled = false;
      }
    }

    async function poll() {
      if (!currentJobIds.length) return;
      const items = await Promise.all(currentJobIds.map(async (jobId) => {
        const [jobRes, logRes] = await Promise.all([
          fetch(api(`/api/jobs/${jobId}`), { headers: authHeaders() }),
          fetch(api(`/api/jobs/${jobId}/logs?limit=120`), { headers: authHeaders() })
        ]);
        const jobData = await jobRes.json();
        const logData = await logRes.json();
        return { job: jobData.job, lines: logData.lines || [] };
      }));
      const jobs = items.map(item => item.job).filter(Boolean);
      const active = jobs.filter(job => !["completed", "completed_with_failures", "failed"].includes(job.status));
      const failed = jobs.filter(job => job.status === "failed").length;
      const withFailures = jobs.filter(job => job.status === "completed_with_failures").length;
      const completed = jobs.filter(job => job.status === "completed").length;
      const status = active.length ? "running" : (failed ? "failed" : (withFailures ? "completed_with_failures" : "completed"));
      setBadge($("jobBadge"), status);
      $("mTotal").textContent = jobs.reduce((sum, job) => sum + Number(job.skus_total || 0), 0);
      $("mProcessed").textContent = jobs.reduce((sum, job) => sum + Number(job.processed || 0), 0);
      $("mOk").textContent = jobs.reduce((sum, job) => sum + Number(job.saved_ok || 0), 0);
      $("mIssue").textContent = jobs.reduce((sum, job) => sum + Number(job.not_found || 0) + Number(job.save_failed || 0), 0);
      $("jobMeta").textContent = `任务 ${jobs.length} 个 | 完成 ${completed} 个 | 有失败 ${failed + withFailures} 个 | 运行中 ${active.length} 个`;
      $("logs").textContent = items.map(({ job, lines }) => {
        const title = job ? `===== ${job.source_file || job.id} | ${job.account} | ht${job.handing_time} | ${job.status} =====` : "===== unknown =====";
        return [title, ...lines].join("\n");
      }).join("\n\n");
      $("logs").scrollTop = $("logs").scrollHeight;
      $("downloads").innerHTML = jobs.flatMap(job => {
        return ["log", "results", "not_found", "failed"].map(name => {
          const label = {log: "日志", results: "结果", not_found: "未查到", failed: "失败"}[name];
          const title = job.source_file || job.id;
          return `<a href="${api(`/api/jobs/${job.id}/download/${name}`)}" data-job-id="${job.id}" data-download="${name}">${escapeHtml(title)} - ${label}</a>`;
        });
      }).join("");
      if (!active.length) {
        clearInterval(pollTimer);
        $("startBtn").disabled = false;
      }
    }

    $("file").addEventListener("change", async (event) => {
      await addFiles(event.target.files);
      $("file").value = "";
    });
    $("folder").addEventListener("change", async (event) => {
      await addFiles(event.target.files);
      $("folder").value = "";
    });
    $("dropZone").addEventListener("dragover", (event) => {
      event.preventDefault();
      $("dropZone").classList.add("dragging");
    });
    $("dropZone").addEventListener("dragleave", () => {
      $("dropZone").classList.remove("dragging");
    });
    $("dropZone").addEventListener("drop", async (event) => {
      event.preventDefault();
      $("dropZone").classList.remove("dragging");
      await addFiles(event.dataTransfer.files);
    });
    $("clearBtn").addEventListener("click", () => {
      $("file").value = "";
      $("folder").value = "";
      queuedFiles = [];
      renderFileQueue();
    });
    $("saveTokenBtn").addEventListener("click", () => {
      localStorage.setItem("htAccessToken", $("accessToken").value);
      alert("访问令牌已保存在当前浏览器。");
    });
    $("downloads").addEventListener("click", async (event) => {
      const link = event.target.closest("a[data-download]");
      if (!link) return;
      event.preventDefault();
      const res = await fetch(link.href, { headers: authHeaders() });
      if (!res.ok) {
        alert("下载失败，请检查访问令牌。");
        return;
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${link.dataset.jobId}-${link.dataset.download}.${link.dataset.download === "log" ? "log" : "csv"}`;
      a.click();
      URL.revokeObjectURL(url);
    });
    $("startBtn").addEventListener("click", startJob);

    $("accessToken").value = localStorage.getItem("htAccessToken") || "";
    loadConfig().catch(() => {
      $("serverState").textContent = "连接失败";
      $("serverState").className = "badge failed";
    });
  </script>
</body>
</html>
